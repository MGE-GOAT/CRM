# Reverse proxy for the CRM on a subdomain, e.g. crm.yourdomain.com
# 1. Put this in /etc/nginx/sites-available/crm.conf and symlink to sites-enabled
# 2. Point an A record for crm.yourdomain.com at this server's IP
# 3. Get a TLS cert:  sudo certbot --nginx -d crm.yourdomain.com

server {
    listen 80;
    server_name crm.yourdomain.com;

    # Certbot will rewrite this block to add the 443 server + redirect.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Real connection IP only (not client-supplied) so the login
        # rate-limiter can't be bypassed via a spoofed X-Forwarded-For.
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
