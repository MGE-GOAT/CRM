# Shared log rotation so container logs can't fill the disk (json-file is
# unbounded by default). Applied to every service via the *default-logging anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: crm
      TZ: Asia/Tehran
    volumes:
      # Postgres 18 images store data in a subdir of /var/lib/postgresql
      - crm_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No host port published in production — only the app talks to it.
    expose:
      - "5432"

  app:
    build: .
    restart: unless-stopped
    logging: *default-logging
    labels:
      autoheal: "true"
    # Cap RAM so a runaway (e.g. a request flood) restarts THIS container cleanly
    # instead of OOM-killing Postgres / the host. Tune to the VPS; leave headroom.
    mem_limit: 768m
    healthcheck:
      # Node 24 has global fetch; restarts the app if it hangs (not just crashes).
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crm:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/crm?schema=public"
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Server timezone — must match the users' locale (Iran) so Jalali dates,
      # reminder/SMS times and "today" highlighting are computed correctly.
      TZ: Asia/Tehran
      # First-run admin (idempotent). Set these in your .env.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      # SMS (Melipayamak classic web service) — leave empty to disable SMS sending.
      MELIPAYAMAK_USERNAME: ${MELIPAYAMAK_USERNAME:-}
      MELIPAYAMAK_PASSWORD: ${MELIPAYAMAK_PASSWORD:-}
      MELIPAYAMAK_SENDER: ${MELIPAYAMAK_SENDER:-}
      # Secret guarding the SMS cron endpoint (/api/cron/send-sms).
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      # Bound to loopback only — the public reaches the app through Nginx/HTTPS,
      # never directly (Docker would otherwise bypass the host firewall).
      - "127.0.0.1:3000:3000"

  # Scheduler: pings the SMS endpoint every minute so due reminders actually send.
  # Reaches the app over the internal compose network (not the public port).
  # Uses node:24-alpine — already cached locally as the app's base image, so it
  # needs no Docker Hub pull (which is blocked/throttled in Iran).
  # No-ops harmlessly (401) until CRON_SECRET is set in .env.
  cron:
    image: node:24-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app:
        condition: service_started
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    command:
      - node
      - -e
      - "const tick=()=>fetch('http://app:3000/api/cron/send-sms',{method:'POST',headers:{'x-cron-secret':process.env.CRON_SECRET||''}}).catch(()=>{});setInterval(tick,60000);tick();"

  # Restarts any container marked unhealthy (e.g. a hung app) automatically.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  crm_db_data:
